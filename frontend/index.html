<!DOCTYPE html>
<html>
<head>
  <title>EcomStore</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    .product { background: white; padding: 15px; margin: 10px; border-radius: 8px; display: inline-block; width: 200px; }
  </style>
</head>
<body>
  <h1>EcomStore 🛒</h1>
  <div id="products"></div>
  <script>
    fetch('http://localhost/api/products')
      .then(res => res.json())
      .then(data => {
        data.forEach(p => {
          document.getElementById('products').innerHTML += 
            `<div class="product"><h3>${p.name}</h3><p>$${p.price}</p></div>`;
        });
      });
  </script>
</body>
</html>
